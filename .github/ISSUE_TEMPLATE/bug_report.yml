name: Bug report
description: Report a bug or unexpected behavior in Hivemoot
title: "[BUG] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and how to reproduce it.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Environment, logs, screenshots. Do not include secrets or tokens.
