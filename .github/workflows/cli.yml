name: CLI

on:
  push:
    branches: [main]
    paths: [cli/**]
  pull_request:
    branches: [main]
    paths: [cli/**]
  workflow_dispatch:

jobs:
  typecheck-test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  publish:
    needs: typecheck-test-build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Auto-bump version if needed
        if: github.event_name == 'push'
        run: |
          # Skip if this commit is itself an auto-bump (prevents trigger loop)
          if git log -1 --format=%s | grep -q "^chore(cli): auto-bump version"; then
            echo "Skipping: triggered by auto-bump commit"
            exit 0
          fi
          CURRENT=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          NPM_LATEST=$(npm view "${PACKAGE_NAME}" version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$NPM_LATEST" ]; then
            npm version patch --no-git-tag-version
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json package-lock.json
            git commit -m "chore(cli): auto-bump version to $(node -p "require('./package.json').version")"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Build
        run: npm run build

      - name: Check if version is already published
        id: check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.published == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
