name: Skills

on:
  push:
    branches: [main]
    paths:
      - ".agent/skills/**"
      - "scripts/validate-skills.js"
  pull_request:
    branches: [main]
    paths:
      - ".agent/skills/**"
      - "scripts/validate-skills.js"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate skill metadata and eval coverage
        run: node scripts/validate-skills.js
